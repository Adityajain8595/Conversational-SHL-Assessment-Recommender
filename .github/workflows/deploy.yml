name: Sync to Hugging Face Spaces

on:
  push:
    branches: [ main ] 

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure Git credentials to push to HF
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Force push to the Hugging Face Space repository using your secret token
          git push --force https://Aditya8595:$HF_TOKEN@huggingface.co/spaces/Aditya8595/Conversational_SHL_Assessment_Recommender main